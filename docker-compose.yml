services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    restart: unless-stopped
    ports:
      - "${FRESHRSS_PORT:-8080}:80"
    volumes:
      - freshrss_data:/var/www/FreshRSS/data
      - freshrss_extensions:/var/www/FreshRSS/extensions
      - ./xExtension-AiAssistant:/var/www/FreshRSS/extensions/xExtension-AiAssistant:ro
    environment:
      TZ: America/New_York
      CRON_MIN: "*/15"
      FRESHRSS_ENV: production
      FRESHRSS_DB_TYPE: pgsql
      FRESHRSS_DB_HOST: postgres
      FRESHRSS_DB_PORT: 5432
      FRESHRSS_DB_BASE: ${POSTGRES_DB:-freshrss}
      FRESHRSS_DB_USER: ${POSTGRES_USER:-freshrss}
      FRESHRSS_DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - newsletter

  postgres:
    image: postgres:16-alpine
    container_name: freshrss-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freshrss}
      POSTGRES_USER: ${POSTGRES_USER:-freshrss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freshrss}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - newsletter

  youtube-helper:
    build: ./youtube-helper
    container_name: youtube-helper
    restart: unless-stopped
    networks:
      - newsletter

  digest:
    build: ./digest
    container_name: digest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config:ro
    depends_on:
      - freshrss
    networks:
      - newsletter

volumes:
  freshrss_data:
  freshrss_extensions:
  postgres_data:

networks:
  newsletter:
    driver: bridge
