name: Deploy to yuffie

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailnet
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --login-server ${{ secrets.HEADSCALE_URL }} --accept-routes --hostname github-deploy

      - name: Deploy via SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Wait for WireGuard tunnel to establish
          tailscale status
          tailscale ping -c 1 --timeout 30s "$DEPLOY_HOST"

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH="ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST}"

          $SSH bash -s <<'SCRIPT'
          set -e
          DEPLOY_DIR="$HOME/freshrss"

          # Preserve .env across deploys
          if [ -f "$DEPLOY_DIR/.env" ]; then
            cp "$DEPLOY_DIR/.env" /tmp/.env.deploy-backup
          fi

          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            rm -rf "$DEPLOY_DIR"
            git clone --recursive https://github.com/shawnsquire/freshrss-deploy.git "$DEPLOY_DIR"
          else
            cd "$DEPLOY_DIR"
            git pull --ff-only
            git submodule update --init --recursive
          fi

          if [ -f /tmp/.env.deploy-backup ]; then
            mv /tmp/.env.deploy-backup "$DEPLOY_DIR/.env"
          fi

          cd "$DEPLOY_DIR"
          docker compose up -d --remove-orphans
          docker compose ps
          SCRIPT
