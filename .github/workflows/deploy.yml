name: Deploy to freshrss

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, ktn]
    steps:
      - name: Deploy via SSH
        run: |
          ssh shawn@freshrss bash -s <<'SCRIPT'
          set -e
          cd ~/freshrss
          git pull --ff-only
          git submodule update --init --recursive
          docker compose up -d --remove-orphans
          docker compose ps
          SCRIPT
